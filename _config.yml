
title: LL
email: "lutfiluthoifi16@gmail.com"
description: >-
  Data Analyst portfolio of Lutfi Luthoifi showcasing data analysis projects,
  dashboards, and insights using SQL, Python, and Tableau.
github_username: lutfiluthoifi
minimal_mistakes_skin: "air"
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Lutfi Luthoifi"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "Aspiring Data Analyst"
  location: "Bekasi, Indonesia"
  email: "lutfiluthoifi16@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/lutfiluthoifi"
    - label: "Tableau"
      icon: "fas fa-fw fa-chart-bar"
      url: "https://public.tableau.com/app/profile/lutfi.luthoifi"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/lutfiluthoifi"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/lutfiluthoifi"

    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/lutfiluthoifi"

    - label: "Tableau"
      icon: "fas fa-fw fa-chart-bar"
      url: "https://public.tableau.com/app/profile/lutfi.luthoifi"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
